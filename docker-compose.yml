version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: bank_pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bankdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: bank_app
    depends_on:
      - postgres
    volumes:
      - .:/app
    ports:
      - "8501:8501"   
    command: tail -f /dev/null

volumes:
  pgdata: